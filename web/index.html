<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claw Mail</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">✉</div>
        <div>
          <h1>Claw Mail</h1>
          <p id="account">连接中…</p>
        </div>
      </div>

      <button id="composeBtn" class="primary full">写邮件</button>

      <nav class="folder-panel">
        <div class="section-title">邮箱文件夹</div>
        <div id="folders" class="folders skeleton-lines"></div>
      </nav>

      <nav class="account-panel">
        <div class="section-title">邮箱范围</div>
        <div id="accounts" class="accounts skeleton-lines"></div>
        <button id="createAccountBtn" class="ghost full">创建子邮箱</button>
      </nav>

      <div class="sidebar-footer">
        <span id="liveDot" class="dot"></span>
        <span id="liveText">实时推送连接中</span>
      </div>
    </aside>

    <main class="mail-layout">
      <section class="toolbar">
        <form id="searchForm" class="search-box">
          <input id="searchInput" autocomplete="off" placeholder="搜索主题 / 发件人 / 收件人" />
          <button type="submit">搜索</button>
        </form>
        <button id="refreshBtn" class="ghost">刷新</button>
      </section>

      <section class="content-grid">
        <section class="message-list-card">
          <div class="list-header">
            <div>
              <h2 id="listTitle">收件箱</h2>
              <p id="listMeta">加载中…</p>
            </div>
            <label class="small-toggle"><input id="unreadOnly" type="checkbox" /> 只看未读</label>
          </div>
          <div id="messageList" class="message-list skeleton-lines"></div>
        </section>

        <section class="reader-card">
          <div id="emptyReader" class="empty-state">
            <div class="empty-icon">📬</div>
            <h2>选一封邮件阅读</h2>
            <p>左侧列表支持搜索、刷新和实时新邮件提示。</p>
          </div>

          <article id="reader" class="reader hidden">
            <header class="reader-header">
              <div>
                <div id="readDate" class="meta"></div>
                <h2 id="readSubject"></h2>
                <p id="readFrom" class="from-line"></p>
              </div>
              <div class="reader-actions">
                <button id="mobileBackBtn" class="ghost mobile-back">← 列表</button>
                <button id="markReadBtn" class="ghost">标已读</button>
                <button id="replyBtn" class="primary">回复</button>
              </div>
            </header>
            <div id="readRecipients" class="recipient-line"></div>
            <iframe id="mailFrame" title="邮件正文" sandbox="" class="mail-frame"></iframe>
            <div id="attachments" class="attachments"></div>
          </article>
        </section>
      </section>
    </main>
  </div>

  <dialog id="composer" class="composer-dialog">
    <form method="dialog" class="composer" id="composerForm">
      <div class="composer-head">
        <div>
          <h2 id="composerTitle">写邮件</h2>
          <p id="composerHint">从本地通过 Claw 163 邮箱发送</p>
        </div>
        <button class="icon-btn" value="cancel" aria-label="关闭">×</button>
      </div>
      <label>收件人 <input id="composeTo" placeholder="a@example.com, b@example.com" /></label>
      <label>抄送 <input id="composeCc" placeholder="可选" /></label>
      <label>主题 <input id="composeSubject" /></label>
      <label>正文 <textarea id="composeBody" rows="10" placeholder="写点什么…"></textarea></label>
      <div class="composer-actions">
        <label class="small-toggle"><input id="composeHtml" type="checkbox" /> HTML</label>
        <span id="composeStatus"></span>
        <button type="button" id="sendBtn" class="primary">发送</button>
      </div>
    </form>
  </dialog>


  <dialog id="accountResultDialog" class="composer-dialog">
    <form method="dialog" class="composer">
      <div class="composer-head">
        <div>
          <h2>子邮箱创建结果</h2>
          <p>一次性 auth code 已保存到本地 .secrets/，请及时复制需要的信息。</p>
        </div>
        <button class="icon-btn" value="cancel" aria-label="关闭">×</button>
      </div>
      <pre id="accountResult" class="result-box"></pre>
      <div class="composer-actions">
        <span></span>
        <button type="button" id="copyAccountResultBtn" class="primary">复制结果</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast hidden"></div>
  <script src="/app.js" type="module"></script>
</body>
</html>
